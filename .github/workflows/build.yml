name: Crear APK de Jarvis
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Build APK
      uses: digreatbrian/buildozer-action@v2
      with:
        python-version: 3.10
    - name: Subir APK
      uses: actions/upload-artifact@v4
      with:
        name: jarvis-apk
        path: bin/*.apk
